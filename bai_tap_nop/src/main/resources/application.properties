# Tên ứng dụng xuất hiện trong application context và các công cụ quan sát.
spring.application.name=logging-security

# Dùng cấu hình Logback dành riêng cho Spring để đọc được các thuộc tính bên dưới.
logging.config=classpath:logback-spring.xml
logging.file.path=log

# Root ghi từ INFO; controller mở TRACE để minh họa đầy đủ năm mức log.
logging.level.root=INFO
logging.level.com.yan.bai_tap_nop.controller=TRACE

# Không trả chi tiết exception nội bộ về client trong phản hồi lỗi mặc định.
server.error.include-message=never
server.error.include-stacktrace=never
